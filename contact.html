<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact · Oremus Bookshop</title>
  
  <!-- Google Font (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  
  <!-- Font Awesome (social icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ===== MAIN WRAPPER ===== */
    .contact-wrapper {
      max-width: 1200px;
      width: 100%;
      background: white;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 2.5rem 2.5rem 3rem;
    }

    /* ===== HEADER ===== */
    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b1a33;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.2rem;
    }
    h1 i {
      color: #2563eb;
      font-size: 2rem;
    }

    .subhead {
      color: #475569;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      border-left: 4px solid #2563eb;
      padding-left: 1rem;
      font-weight: 400;
      background: #f1f5f9;
      border-radius: 0 12px 12px 0;
      width: fit-content;
      padding: 0.5rem 1.2rem;
    }

    /* ===== GRID LAYOUT ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.8rem;
    }

    /* ===== LEFT: FORM ===== */
    .form-section {
      background: #ffffff;
      border-radius: 1.8rem;
      padding: 0.2rem 0;
    }
    .form-section h2 {
      font-size: 1.6rem;
      font-weight: 500;
      color: #0f2b4b;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-section h2 i {
      color: #2563eb;
      font-size: 1.4rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-group label {
      font-weight: 500;
      font-size: 0.9rem;
      color: #1e293b;
      letter-spacing: 0.01em;
    }
    .form-group label .required {
      color: #dc2626;
      margin-left: 2px;
    }
    .form-group input,
    .form-group textarea {
      padding: 0.8rem 1.2rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: 0.2s;
      background: #f9fbfd;
      outline: none;
      width: 100%;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .error-message {
      color: #dc2626;
      font-size: 0.8rem;
      padding-left: 0.5rem;
      min-height: 1.2rem;
      margin-top: 0.1rem;
    }

    .btn-submit {
      background: #2563eb;
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px -6px rgba(37, 99, 235, 0.3);
      border: 1px solid transparent;
      margin-top: 0.6rem;
      width: fit-content;
      min-width: 160px;
    }
    .btn-submit:hover {
      background: #1d4ed8;
      transform: scale(1.01);
      box-shadow: 0 12px 24px -8px rgba(37, 99, 235, 0.4);
    }
    .btn-submit i {
      font-size: 1rem;
    }

    /* ===== RIGHT: INFO ===== */
    .info-section {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .info-card {
      background: #f8fafc;
      border-radius: 1.8rem;
      padding: 1.8rem 1.8rem 1.4rem;
      border: 1px solid #eef2f6;
    }
    .info-card h3 {
      font-size: 1.2rem;
      font-weight: 500;
      color: #0f2b4b;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .info-card h3 i {
      color: #2563eb;
      width: 1.6rem;
    }

    .contact-detail {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.5rem 0;
      color: #1e293b;
      font-size: 0.98rem;
      border-bottom: 1px solid #e9edf2;
    }
    .contact-detail:last-of-type {
      border-bottom: none;
    }
    .contact-detail i {
      width: 1.6rem;
      color: #2563eb;
      font-size: 1.1rem;
      text-align: center;
    }
    .contact-detail a {
      color: #1e293b;
      text-decoration: none;
      transition: 0.15s;
    }
    .contact-detail a:hover {
      color: #2563eb;
    }

    /* ===== SOCIAL LINKS ===== */
    .social-links {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }
    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: #1e293b;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      font-size: 1.4rem;
      border: 1px solid #dce2ec;
      transition: 0.2s;
      text-decoration: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    .social-links a:hover {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      transform: translateY(-3px);
      box-shadow: 0 8px 14px -6px #2563eb55;
    }

    /* ===== MAP ===== */
    .map-container {
      border-radius: 1.8rem;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      background: #eef2f6;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }
    .map-container iframe {
      display: block;
      width: 100%;
      height: 220px;
      border: 0;
    }
    .map-card p {
      font-size: 0.85rem;
      color: #334155;
      margin-top: 0.6rem;
    }
    .map-card p i {
      color: #2563eb;
      margin-right: 4px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 820px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .contact-wrapper {
        padding: 1.8rem;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="contact-wrapper">
    <h1>
      <i class="fas fa-paper-plane"></i> Contact Us
    </h1>
    <div class="subhead">We'd love to hear from you — drop us a message</div>

    <div class="contact-grid">
      <!-- LEFT: Contact Form -->
      <section class="form-section">
        <h2><i class="fas fa-envelope"></i> Send a message</h2>
        <form id="contactForm" class="contact-form" novalidate>
          <div class="form-group">
            <label for="name">Full name <span class="required">*</span></label>
            <input type="text" id="name" placeholder="e.g. Jane Doe" required />
            <div class="error-message" id="nameError"></div>
          </div>

          <div class="form-group">
            <label for="email">Email address <span class="required">*</span></label>
            <input type="email" id="email" placeholder="jane@example.com" required />
            <div class="error-message" id="emailError"></div>
          </div>

          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" placeholder="How can we help you?" required></textarea>
            <div class="error-message" id="messageError"></div>
          </div>

          <button type="submit" class="btn-submit">
            <i class="fas fa-paper-plane"></i> Send
          </button>
        </form>
      </section>

      <!-- RIGHT: Info + Map + Socials -->
      <aside class="info-section">
        <!-- Contact details -->
        <div class="info-card">
          <h3><i class="fas fa-phone-alt"></i> Phone &amp; email</h3>
          <div class="contact-detail">
            <i class="fas fa-phone"></i>
            <a href="tel:+254712345678">+254 712 345 678</a>
          </div>
          <div class="contact-detail">
            <i class="fas fa-envelope"></i>
            <a href="mailto:info@oremusbookshop.com">info@oremusbookshop.com</a>
          </div>
          <div class="contact-detail">
            <i class="fas fa-clock"></i>
            <span>Mon–Sat: 8am – 7pm</span>
          </div>
        </div>

        <!-- Store location map - Oremus Bookshop -->
        <div class="info-card map-card">
          <h3><i class="fas fa-map-pin"></i> Visit our store</h3>
          <div class="map-container">
            <!-- Google Maps embed for Oremus Bookshop, Nairobi -->
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15955.474799999999!2d36.8115712!3d-1.31072!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f111165b657cf%3A0x365928aca4b168a!2sOremus%20Bookshop!5e0!3m2!1sen!2ske!4v1700000000000!5m2!1sen!2ske" 
              width="100%" 
              height="220" 
              style="border:0;" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade"
              title="Oremus Bookshop location map">
            </iframe>
          </div>
          <p>
            <i class="fas fa-location-dot"></i> 
            Oremus Bookshop, TUSKER HSE, Ronald Ngala St, Nairobi
          </p>
        </div>

        <!-- Social media links -->
        <div class="info-card">
          <h3><i class="fas fa-share-nodes"></i> Connect with us</h3>
          <div class="social-links">
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    // ===== CONTACT FORM VALIDATION =====
    (function() {
      const form = document.getElementById('contactForm');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const messageInput = document.getElementById('message');

      const nameError = document.getElementById('nameError');
      const emailError = document.getElementById('emailError');
      const messageError = document.getElementById('messageError');

      // Helper to show error
      function setError(input, errorElement, message) {
        if (message) {
          errorElement.textContent = message;
          input.style.borderColor = '#dc2626';
        } else {
          errorElement.textContent = '';
          input.style.borderColor = '#e2e8f0';
        }
      }

      // Validate single field
      function validateName() {
        const val = nameInput.value.trim();
        if (val.length < 2) {
          setError(nameInput, nameError, 'Name must be at least 2 characters.');
          return false;
        } else {
          setError(nameInput, nameError, '');
          return true;
        }
      }

      function validateEmail() {
        const val = emailInput.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(val)) {
          setError(emailInput, emailError, 'Please enter a valid email address.');
          return false;
        } else {
          setError(emailInput, emailError, '');
          return true;
        }
      }

      function validateMessage() {
        const val = messageInput.value.trim();
        if (val.length < 5) {
          setError(messageInput, messageError, 'Message must be at least 5 characters.');
          return false;
        } else {
          setError(messageInput, messageError, '');
          return true;
        }
      }

      // Real-time validation on blur
      nameInput.addEventListener('blur', validateName);
      emailInput.addEventListener('blur', validateEmail);
      messageInput.addEventListener('blur', validateMessage);

      // On submit
      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const isNameValid = validateName();
        const isEmailValid = validateEmail();
        const isMessageValid = validateMessage();

        if (isNameValid && isEmailValid && isMessageValid) {
          // Success simulation
          alert('✅ Message sent successfully! (Demo)');
          form.reset();
          // Reset all borders to default
          [nameInput, emailInput, messageInput].forEach(input => {
            input.style.borderColor = '#e2e8f0';
          });
          // Clear all error messages
          [nameError, emailError, messageError].forEach(el => el.textContent = '');
        } else {
          // Focus first invalid field
          if (!isNameValid) nameInput.focus();
          else if (!isEmailValid) emailInput.focus();
          else if (!isMessageValid) messageInput.focus();
        }
      });
    })();
  </script>
</body>
</html>
