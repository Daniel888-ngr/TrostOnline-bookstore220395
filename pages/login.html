<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trost BookStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .auth-container h1 {
            font-size: 2rem;
            color: #212529;
        }
        .auth-container .brand-icon {
            color: #0d6efd;
            font-size: 2.5rem;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary {
            background: #0d6efd;
            border: none;
            padding: 0.7rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #0b5ed7;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            min-height: 1.5rem;
        }
        .auth-link {
            color: #0d6efd;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="text-center mb-4">
            <i class="fas fa-book-open brand-icon"></i>
            <h1>Welcome Back</h1>
            <p class="text-muted">Login to your Trost BookStore account</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Don't have an account? <a href="signup.html" class="auth-link">Sign Up</a></p>
            <a href="index.html" class="text-muted" style="font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            emailError.textContent = '';
            passwordError.textContent = '';

            if (!email) {
                emailError.textContent = 'Please enter your email.';
                return;
            }

            if (!password) {
                passwordError.textContent = 'Please enter your password.';
                return;
            }

            // Check if user exists in localStorage
            const storedUsers = JSON.parse(localStorage.getItem('users')) || [];
            const user = storedUsers.find(u => u.email === email && u.password === password);

            if (user) {
                // Login successful
                localStorage.setItem('currentUser', email);
                localStorage.setItem('userData', JSON.stringify({ name: user.name, email: user.email }));
                alert('✅ Login successful! Welcome back, ' + user.name + '!');
                window.location.href = 'index.html';
            } else {
                const emailExists = storedUsers.find(u => u.email === email);
                if (emailExists) {
                    passwordError.textContent = 'Incorrect password. Please try again.';
                } else {
                    emailError.textContent = 'No account found with this email. Please sign up.';
                }
            }
        });
    </script>
</body>
</html>
