        }

        .filter-section .form-control {

            padding: 10px 20px;
        }

            background: #2563eb;
            color: white;
            border-radius: 25px;
            padding: 10px 25px;
            border: none;
            width: 100%;
        }

        .filter-section .btn-search:hover {
            background: #1d4ed8;
        }

        .filter-section select {
            border-radius: 25px;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            width: 100%;
        }

            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .book-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .book-card .book-info {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-card .book-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0b1a33;
            margin-bottom: 5px;
        }

        .book-card .book-author {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .book-card .book-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2563eb;
        }

        .book-card .book-rating {
            color: #f59e0b;
            margin-bottom: 8px;
        }

        .book-card .book-rating span {
            color: #64748b;
            font-size: 0.85rem;
        }

        .book-card .availability {

            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

            background: #dcfce7;
            color: #16a34a;
        }

        .availability.out-of-stock {
            background: #fee2e2;
            color: #dc2626;
        }

            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

            height: 32px;

            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #0b1a33;
        }

        .quantity-controls button:hover {
            background: #f1f5f9;
            border-color: #2563eb;
        }

        .quantity-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .quantity-controls .qty-display {
            font-weight: 600;
            min-width: 25px;
            text-align: center;
            font-size: 1rem;

        .book-card .btn-add {

            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            width: 100%;
            transition: 0.3s;
            margin-top: auto;

        }

        }

        .book-card .btn-add.in-cart {

            border-radius: 8px;

            color: white;
            border-color: #2563eb;
        }

            cursor: not-allowed;

            right: 20px;

            justify-content: space-between;

        // ========== HELPER FUNCTIONS ==========
        function getStars(rating) {
            let stars = '';
            const fullStars = Math.floor(rating);
            const halfStar = rating % 1 >= 0.5;
            
            for (let i = 0; i < fullStars; i++) {
                stars += '<i class="fas fa-star"></i>';
            }
            if (halfStar) {
                stars += '<i class="fas fa-star-half-alt"></i>';
            }
            const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
            for (let i = 0; i < emptyStars; i++) {
                stars += '<i class="far fa-star"></i>';
            }
            return stars;
        }

        // Get quantity from cart for a specific book
        function getCartQuantity(bookId) {
            const cart = getCart();
            const item = cart.find(item => item.id === bookId);
            return item ? item.quantity : 0;

            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            renderCartItems();
        }

        // Close cart
        function closeCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Get cart items
        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }

        // Save cart
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        // Update cart count badge
        function updateCartCount() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartCount');
            if (badge) {
                badge.textContent = totalItems;
            }
        }

        // Render cart items
        function renderCartItems() {
            const cart = getCart();
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const cartFooter = document.getElementById('cartFooter');

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-bag"></i>
                        <h5>Your cart is empty</h5>
                        <p>Start adding some books!</p>
                    </div>
                `;
                cartFooter.style.display = 'none';
                updateCartCount();
                return;
            }

            cartFooter.style.display = 'block';
            
            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                html += `
                    <div class="cart-item">
                        <img src="${item.image || 'https://via.placeholder.com/60x80/0b1a33/ffffff?text=Book'}" alt="${item.title}">
                        <div class="cart-item-details">
                            <h6>${item.title}</h6>
                            <p>KSH${item.price.toFixed(2)}</p>
                        </div>
                        <div class="cart-item-actions">
                            <button onclick="updateQuantity(${index}, -1)">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span class="quantity">${item.quantity}</span>
                            <button onclick="updateQuantity(${index}, 1)">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button onclick="removeFromCart(${index})" style="color: #ef4444; border-color: #fee2e2;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            cartItems.innerHTML = html;
            cartTotal.textContent = `KSH${total.toFixed(2)}`;
            updateCartCount();
        }

        // Update quantity in cart
        function updateQuantity(index, change) {
            const cart = getCart();
            if (!cart[index]) return;
            
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            saveCart(cart);
            renderCartItems();
            renderBooks(); // Re-render books to update quantity displays
        }

        // Remove item from cart
        function removeFromCart(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCartItems();
            renderBooks(); // Re-render books to update quantity displays
        }

        // Checkout
        function checkout() {
            const cart = getCart();
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            if (confirm(`📚 Order Summary:\n\nBooks: ${itemCount}\nTotal: KSH${total.toFixed(2)}\n\nProceed to checkout?`)) {
                alert('✅ Thank you for your order!\nYour books will be delivered soon.');
                localStorage.removeItem('cart');
                renderCartItems();
                updateCartCount();
                closeCart();
                renderBooks(); // Re-render books to reset quantity displays
            }
        }

        // ========== BOOK QUANTITY CONTROLS ==========
        function changeBookQuantity(bookId, change) {
            const book = books.find(b => b.id === bookId);
            if (!book || !book.inStock) return;

            let cart = getCart();
            const existing = cart.find(item => item.id === bookId);
            
            if (existing) {
                const newQty = existing.quantity + change;
                if (newQty <= 0) {
                    // Remove from cart
                    cart = cart.filter(item => item.id !== bookId);
                } else {
                    existing.quantity = newQty;
                }
            } else if (change > 0) {
                // Add new item
                cart.push({
                    id: book.id,
                    title: book.title,
                    price: book.price,
                    quantity: 1,
                    image: book.image
                });
            }
            
            saveCart(cart);
            updateCartCount();
            renderBooks(); // Re-render to update quantity displays
        }

        // ========== ADD TO CART ==========
        function addToCart(bookId) {
            const book = books.find(b => b.id === bookId);
            if (!book || !book.inStock) {
                alert('Sorry, this book is out of stock!');
                return;
            }
            
            let cart = getCart();
            const existing = cart.find(item => item.id === bookId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    id: book.id,
                    title: book.title,
                    price: book.price,
                    quantity: 1,
                    image: book.image
                });
            }
            
            saveCart(cart);
            updateCartCount();
            renderBooks();
            
            // Show notification
            showNotification(`✅ "${book.title}" added to cart!`);
        }

        // ========== NOTIFICATION ==========
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; 
                bottom: 20px; 
                right: 20px; 
                background: #16a34a; 
                color: white; 
                padding: 15px 25px; 
                border-radius: 10px; 
                z-index: 9999; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                animation: slideIn 0.3s ease;
                max-width: 350px;
            `;
            notification.innerHTML = `${message} <span style="cursor:pointer;margin-left:15px;font-weight:bold;" onclick="this.parentElement.remove()">&times;</span>`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }
            }, 3000);
        }

        // ========== RENDER BOOKS ==========
        function renderBooks() {
            // Filter books
            const searchTerm = searchInput.value.toLowerCase().trim();
            const category = categoryFilter.value;
            
            filteredBooks = books.filter(book => {
                const matchesSearch = !searchTerm || 
                    book.title.toLowerCase().includes(searchTerm) || 
                    book.author.toLowerCase().includes(searchTerm);
                const matchesCategory = category === 'all' || book.category === category;
                return matchesSearch && matchesCategory;
            });

            // Sort books
            const sortBy = sortFilter.value;
            if (sortBy === 'price-low') {
                filteredBooks.sort((a, b) => a.price - b.price);
            } else if (sortBy === 'price-high') {
                filteredBooks.sort((a, b) => b.price - a.price);
            } else if (sortBy === 'rating') {
                filteredBooks.sort((a, b) => b.rating - a.rating);
            } else if (sortBy === 'name') {
                filteredBooks.sort((a, b) => a.title.localeCompare(b.title));
            }

            // Update results count
            const totalResults = filteredBooks.length;
            resultsCount.textContent = totalResults > 0 ? `Showing ${totalResults} book${totalResults > 1 ? 's' : ''}` : '';

            // Show/hide no results
            if (totalResults === 0) {
                noResults.style.display = 'block';
                booksGrid.innerHTML = '';
                paginationDiv.innerHTML = '';
                return;
            } else {
                noResults.style.display = 'none';
            }

            // Pagination
            const totalPages = Math.ceil(totalResults / booksPerPage);
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }
            if (currentPage < 1) {
                currentPage = 1;
            }

            const startIndex = (currentPage - 1) * booksPerPage;
            const endIndex = Math.min(startIndex + booksPerPage, totalResults);
            const pageBooks = filteredBooks.slice(startIndex, endIndex);

            // Get cart for quantity display
            const cart = getCart();

            // Render books
            booksGrid.innerHTML = '';
            pageBooks.forEach(book => {
                const col = document.createElement('div');
                col.className = 'col-md-3 col-sm-6 mb-4';
                
                const stockClass = book.inStock ? 'in-stock' : 'out-of-stock';
                const stockText = book.inStock ? 'In Stock' : 'Out of Stock';
                const cartQty = getCartQuantity(book.id);
                const inCart = cartQty > 0;
                
                col.innerHTML = `
                    <div class="book-card">
                        <img src="${book.image}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/300x280/0b1a33/ffffff?text=${book.title}'">
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-author">by ${book.author}</div>
                            <div class="book-rating">
                                ${getStars(book.rating)}
                                <span>(${book.reviews})</span>
                            </div>
                            <div class="book-price">KSH${book.price.toFixed(2)}</div>
                            <div class="availability ${stockClass}">${stockText}</div>
                            
                            ${book.inStock ? `
                                <div class="quantity-controls">
                                    <button onclick="changeBookQuantity(${book.id}, -1)" ${!inCart ? 'disabled' : ''}>
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <span class="qty-display" id="qty-${book.id}">${cartQty}</span>
                                    <button onclick="changeBookQuantity(${book.id}, 1)">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                    <span style="font-size:0.8rem;color:#64748b;margin-left:5px;">in cart</span>
                                </div>
                                <button class="btn-add ${inCart ? 'in-cart' : ''}" onclick="addToCart(${book.id})">
                                    <i class="fas ${inCart ? 'fa-check' : 'fa-cart-plus'}"></i> 
                                    ${inCart ? 'Added' : 'Add to Cart'}
                                </button>
                            ` : `
                                <button class="btn-add" disabled>
                                    <i class="fas fa-times"></i> Unavailable
                                </button>
                            `}
                        </div>
                    </div>
                `;
                booksGrid.appendChild(col);
            });

            // Render pagination
            renderPagination(totalPages);
        }

        // ========== RENDER PAGINATION ==========
        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }

            let html = '';
            
            // Previous button
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>`;

            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="active">${i}</button>`;
                } else if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                    html += `<button onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<button disabled>...</button>`;
                }
            }

            // Next button
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>`;

            paginationDiv.innerHTML = html;
        }

        // ========== PAGE NAVIGATION ==========
        function goToPage(page) {
            const totalPages = Math.ceil(filteredBooks.length / booksPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderBooks();
            window.scrollTo({ top: document.querySelector('.filter-section').offsetTop - 100, behavior: 'smooth' });
        }

        // ========== EVENT LISTENERS ==========
        searchBtn.addEventListener('click', function() {
            currentPage = 1;
            renderBooks();
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                currentPage = 1;
                renderBooks();
            }
        });

        categoryFilter.addEventListener('change', function() {
            currentPage = 1;
            renderBooks();
        });

        sortFilter.addEventListener('change', function() {
            currentPage = 1;
            renderBooks();
        });

        // ========== INITIAL LOAD ==========
        renderBooks();
        updateCartCount();
    </script>

</body>
</html>
