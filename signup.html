<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Trost BookStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .auth-container h1 {
            font-size: 2rem;
            color: #212529;
        }
        .auth-container .brand-icon {
            color: #0d6efd;
            font-size: 2.5rem;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary {
            background: #0d6efd;
            border: none;
            padding: 0.7rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #0b5ed7;
        }
        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            min-height: 1.5rem;
        }
        .password-hint {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .auth-link {
            color: #0d6efd;
            text-decoration: none;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="text-center mb-4">
            <i class="fas fa-book-open brand-icon"></i>
            <h1>Create Account</h1>
            <p class="text-muted">Join the Trost BookStore community</p>
        </div>

        <form id="signupForm">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create a password" required>
                <div class="password-hint">Must be at least 6 characters</div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                <div class="error-message" id="confirmError"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Already have an account? <a href="login.html" class="auth-link">Login</a></p>
            <a href="index.html" class="text-muted" style="font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');

            nameError.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            confirmError.textContent = '';

            // Validate name
            if (name.length < 2) {
                nameError.textContent = 'Name must be at least 2 characters.';
                return;
            }

            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailError.textContent = 'Please enter a valid email address.';
                return;
            }

            // Check if email already exists
            const storedUsers = JSON.parse(localStorage.getItem('users')) || [];
            if (storedUsers.find(u => u.email === email)) {
                emailError.textContent = 'This email is already registered. Please login.';
                return;
            }

            // Validate password
            if (password.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters.';
                return;
            }

            // Validate confirm password
            if (password !== confirmPassword) {
                confirmError.textContent = 'Passwords do not match.';
                return;
            }

            // Save user to localStorage
            const newUser = { name, email, password };
            storedUsers.push(newUser);
            localStorage.setItem('users', JSON.stringify(storedUsers));

            // Auto-login after signup
            localStorage.setItem('currentUser', email);
            localStorage.setItem('userData', JSON.stringify({ name, email }));

            alert('✅ Account created successfully! Welcome to Trost BookStore, ' + name + '!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
